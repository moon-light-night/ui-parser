syntax = "proto3";

package uiparser.analyzer;

option go_package = "uiparser/analyzer";

// AnalyzerService is the internal service for screenshot analysis and chat generation
// This service is called by the backend, not directly by the frontend
service AnalyzerService {
  // Analyze a screenshot and return structured JSON result
  rpc AnalyzeScreenshot(AnalyzeScreenshotRequest) returns (AnalyzeScreenshotResponse);
  
  // Generate a chat reply given screenshot context and conversation history
  rpc GenerateChatReply(GenerateChatReplyRequest) returns (stream GenerateChatReplyEvent);

  // Generate a short session title from the first user message
  rpc GenerateTitle(GenerateTitleRequest) returns (GenerateTitleResponse);
}

// AnalyzeScreenshot request
message AnalyzeScreenshotRequest {
  string screenshot_id = 1;
  string storage_bucket = 2;
  string storage_key = 3;
  bytes image_data = 4; // Alternative: send image bytes directly
  string model_name = 5;
  string analysis_mode = 6; // e.g., "full", "quick", "accessibility"
}

// AnalyzeScreenshot response with structured analysis
message AnalyzeScreenshotResponse {
  string analysis_id = 1;
  string screen_type = 2;
  string summary = 3;
  repeated Section sections = 4;
  repeated Issue ui_issues = 5;
  repeated Suggestion ux_suggestions = 6;
  repeated Task implementation_tasks = 7;
  string raw_json = 8; // Original model output for debugging
  string error_message = 9;
  bool success = 10;
}

// Section in the analysis
message Section {
  string name = 1;
  string description = 2;
}

// UI issue found
message Issue {
  string title = 1;
  string severity = 2; // "low", "medium", "high"
  string description = 3;
  string evidence = 4;
  string recommendation = 5;
}

// UX suggestion
message Suggestion {
  string title = 1;
  string description = 2;
}

// Implementation task
message Task {
  string title = 1;
  string description = 2;
  string priority = 3; // "low", "medium", "high"
}

// GenerateChatReply request
message GenerateChatReplyRequest {
  string session_id = 1;
  string screenshot_id = 2;
  
  // Context for the model
  ScreenshotContext screenshot_context = 3;
  AnalysisContext analysis_context = 4;
  repeated ConversationMessage history = 5;
  
  // The new user message
  string user_message = 6;
  string model_name = 7;
}

// Screenshot context for chat
message ScreenshotContext {
  string original_filename = 1;
  string mime_type = 2;
  string storage_bucket = 3;
  string storage_key = 4;
  bytes image_data = 5; // Optional: send image bytes
}

// Analysis context for chat
message AnalysisContext {
  string screen_type = 1;
  string summary = 2;
  string analysis_json = 3; // Full analysis as JSON string
}

// Previous conversation message
message ConversationMessage {
  string role = 1; // "user", "assistant", "system"
  string content = 2;
}

// GenerateChatReply streaming event
message GenerateChatReplyEvent {
  oneof event {
    ChunkEvent chunk = 1;
    DoneEvent done = 2;
    ErrorEvent error = 3;
  }
}

// Streaming chunk from the model
message ChunkEvent {
  string text = 1;
  int32 index = 2;
}

// Generation complete
message DoneEvent {
  string full_response = 1;
  string model_name = 2;
  int32 total_tokens = 3;
}

// Error during generation
message ErrorEvent {
  string code = 1;
  string message = 2;
}

// GenerateTitle — produce a short human-readable session title
message GenerateTitleRequest {
  string user_message = 1;  // First user message in the session
  string model_name = 2;    // Optional, falls back to OLLAMA_CHAT_MODEL env var
}

message GenerateTitleResponse {
  string title = 1;
  bool success = 2;
  string error_message = 3;
}
